# EpiGraph CDST Calibration Constants
# Ported from scripts/lib/cdst_bba.py (SciFact-calibrated, 0.948 F1)
#
# Mass function triplets are [base_support, base_against, base_ignorance].

default_journal_reliability = 0.78

# ── Methodology Profiles ────────────────────────────────────────────────────
# Canonical profiles only. Aliases are in [methodology_aliases].
# Each value is [base_support, base_against, base_ignorance].

[methodology_profiles]
legal_document_review    = [0.90, 0.02, 0.08]
deductive_logic          = [0.85, 0.05, 0.10]
meta_analysis            = [0.80, 0.05, 0.15]
theoretical_derivation   = [0.80, 0.05, 0.15]
statistical_analysis     = [0.75, 0.05, 0.20]
bayesian_inference       = [0.70, 0.05, 0.25]
computational            = [0.72, 0.05, 0.23]
instrumental             = [0.80, 0.05, 0.15]
inductive_generalization = [0.60, 0.08, 0.32]
visual_inspection        = [0.55, 0.08, 0.37]
observational            = [0.60, 0.08, 0.32]
expert_elicitation       = [0.45, 0.10, 0.45]
extraction               = [0.58, 0.07, 0.35]
textbook_assertion       = [0.78, 0.04, 0.18]
negative_result          = [0.70, 0.05, 0.25]
default                  = [0.50, 0.08, 0.42]

# ── Methodology Aliases ─────────────────────────────────────────────────────
# Maps alternate names to canonical profile keys above.

[methodology_aliases]
deductive                = "deductive_logic"
deductive_reasoning      = "deductive_logic"
"meta-analysis"          = "meta_analysis"
statistical              = "statistical_analysis"
statistical_inference    = "statistical_analysis"
bayesian                 = "bayesian_inference"
computational_simulation = "computational"
instrumental_measurement = "instrumental"
experimental_observation = "instrumental"
inductive                = "inductive_generalization"
expert                   = "expert_elicitation"
testimonial              = "expert_elicitation"
llm_extraction           = "extraction"
literature_synthesis     = "extraction"

# ── Evidence Type Weights ───────────────────────────────────────────────────

[evidence_type_weights]
regulatory      = 1.0
empirical       = 1.0
statistical     = 0.9
logical         = 0.85
testimonial     = 0.6
circumstantial  = 0.4
conversational  = 0.3

# ── Evidence Type Aliases ───────────────────────────────────────────────────
# Maps the DB's `evidence.evidence_type` enum values to the canonical
# SciFact-calibration keys above. Without these aliases every lookup against
# DB-stored evidence falls through to the 0.5 unknown-type default —
# leaves any legacy NULL-source_strength BBAs effectively undiscounted under
# the auto_wire_ds path.

[evidence_type_aliases]
observation = "empirical"      # direct empirical observation
computation = "statistical"    # computational / statistical analysis
document    = "logical"        # claim asserted in a document
reference   = "logical"        # citation to another claim/source
testimony   = "testimonial"    # explicit agent testimony

# ── Section Tier Weights ────────────────────────────────────────────────────
# Fraction of informative mass retained (rest shifted to theta).

[section_tier_weights]
primary_provision = 1.0
results      = 1.0
methods      = 0.90
discussion   = 0.70
conclusion   = 0.65
introduction = 0.50
abstract     = 0.80
other        = 0.75

# ── Journal Reliability ─────────────────────────────────────────────────────

[journal_reliability]
"Nature"                  = 0.92
"Science"                 = 0.92
"Cell"                    = 0.90
"The Lancet"              = 0.90
"Nature Communications"   = 0.88
"Physical Review Letters" = 0.88
"PNAS"                    = 0.87
"JACS"                    = 0.87
"ACS Nano"                = 0.86
"Chemical Reviews"        = 0.88
"iScience"                = 0.82
"Chemical Science"        = 0.84
"MRS Bulletin"            = 0.83
"Nanophotonics"           = 0.82
"Annual Review"           = 0.88
"arXiv preprint"          = 0.70
"bioRxiv"                 = 0.70
"chemRxiv"                = 0.70
"medRxiv"                 = 0.70

# ── Classifier Thresholds ───────────────────────────────────────────────────
# Holdout sweep: 5-fold CV on 80% train, 0.940 F1 on 20% held-out test.

[classifier_thresholds]
nei_threshold          = 0.85
support_threshold      = 0.15
conflict_threshold     = 0.05
has_opposing_threshold = 0.1

# ── Cross-Source Matcher ────────────────────────────────────────────────────
# See docs/superpowers/specs/2026-05-21-cross-source-matching-design.md
[matcher.weights]
embed_cosine     = 0.35
triple_overlap   = 0.15
entity_jaccard   = 0.10
method_match     = 0.05
nbhd_overlap     = 0.05
citation_overlap = 0.05
graph_overlap    = 0.10
belief_alignment = 0.10
theme_proximity  = 0.05

[matcher.bands]
high = 0.85
mid  = 0.60

[matcher.embedding]
model_version = "v1"

[matcher.filter]
include_agent_id = false

[matcher.fan_out]
max_per_claim = 32

# ── Evidence Locality Discounting ───────────────────────────────────────────
# Shafer reliability discount applied to evidential BBAs based on whether the
# edge crosses paper boundaries. Intra-source supporters are not independent
# observations of a target, so their per-BBA reliability is lower.
#
# Defaults tuned against the synthetic 19-supporter NEMS regression: target
# BetP lands in [0.7, 0.85] (replacing the un-discounted 0.997 inflation).

[evidence_locality]
intra_source_support_strength = 0.25
cross_source_support_strength = 1.0
