name: CI

on:
  push:
    branches: [main]
  pull_request:

# Actions are pinned to a full commit SHA (not a floating tag) so a compromised
# or force-pushed upstream tag cannot silently change what runs in CI. The
# trailing comment records the version the SHA resolved to at pin time.
# dtolnay/rust-toolchain selects the channel from the *ref name*; pinning by SHA
# defeats that, so the channel stays explicit via the `toolchain` input below.
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: epigraph
          POSTGRES_PASSWORD: epigraph
          POSTGRES_DB: epigraph
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://epigraph:epigraph@localhost:5432/epigraph
      SQLX_OFFLINE: "true"
      # CI resource mitigations — GitHub-hosted ubuntu-latest is 4 vCPU /
      # 16 GB RAM / ~14 GB disk. Default cargo build + lld link saturates
      # that on a workspace this size; symptoms are intermittent SIGBUS in
      # rust-lld (linker OOM during mmap) and ENOSPC on the host disk.
      #
      # CARGO_BUILD_JOBS=2: cap parallel rustc/link to 2. Each link can be
      # 1–2 GB RSS; 2× ≈ 4 GB worst case, comfortable headroom.
      CARGO_BUILD_JOBS: "2"
      # CARGO_PROFILE_TEST_DEBUG=line-tables-only: keep backtraces, drop the
      # heavy DWARF that bloats each test binary to 100–400 MB. Halves the
      # target/ tree on workspaces of this shape — speeds linking AND
      # reduces disk pressure.
      CARGO_PROFILE_TEST_DEBUG: "line-tables-only"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Install mold (low-memory parallel linker)
        # Replaces rust-lld for the workspace. mold uses dramatically less
        # RAM than lld on multi-binary workspaces — the other half of the
        # linker-OOM fix above. apt's mold on ubuntu-24.04 runners is
        # sufficient (>= 2.x).
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mold
          mkdir -p .cargo
          {
            echo ""
            echo "# CI-only: route the workspace through mold. Scoped to the"
            echo "# runner triple so local dev on other platforms is unaffected."
            echo "# Uses the default cc driver (-fuse-ld=mold), no clang required."
            echo "[target.x86_64-unknown-linux-gnu]"
            echo 'rustflags = ["-C", "link-arg=-fuse-ld=mold"]'
          } >> .cargo/config.toml
          mold --version
      - name: Free disk space on /
        # Runs intermittently ENOSPC'd on / during the serialized test phase
        # (observed: "Test (epigraph-api)" → "No space left on device" writing
        # the runner _diag log) at a high enough rate (~85% of PRs) to be
        # systematic, not flaky infra. A df at THIS point shows / with ~107 GB
        # bytes and ~94% inodes free, so the volume is not full pre-build — the
        # consumption happens DURING the per-test #[sqlx::test] phase (postgres
        # template/test DBs in the docker overlay on /, plus test-binary link
        # artifacts), which a pre-build df cannot see. Reclaiming the ~24 GB of
        # preinstalled Android/.NET/GHC/Haskell/hosted-toolcache trees this
        # build never touches gives the test phase enough headroom to finish.
        #
        # NOTE: an earlier attempt set CARGO_TARGET_DIR=/mnt — inert, because the
        # mount table shows no separate /mnt disk (/mnt is a dir on /dev/root).
        # The df -ih / df -h lines record the headroom actually reclaimed.
        run: |
          df -ih / ; df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache /usr/local/share/boost || true
          df -ih / ; df -h /
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      # --locked: Cargo.lock is committed; enforce it so CI builds the exact
      # locked dependency graph and fails loudly if the lock is stale rather
      # than silently resolving newer versions.
      - name: Build
        run: cargo build --workspace --locked
      - name: Test (non-DB packages, parallel)
        # Packages without DB tests can run fully in parallel.
        # Crates with #[sqlx::test] integration tests (or live DB usage) are
        # excluded here and run sequentially below — concurrent test instances
        # race on _sqlx_migrations when applying migrations to the template DB.
        run: cargo test --workspace --locked
          --exclude epigraph-db
          --exclude epigraph-api
          --exclude epigraph-engine
          --exclude epigraph-mcp
          --exclude epigraph-embeddings
      - name: Test (epigraph-db, serialized)
        # #[sqlx::test] creates a postgres template DB per binary; concurrent
        # binaries race on _sqlx_migrations → "tuple concurrently updated".
        # --test-threads=1 serializes within the binary; running packages
        # sequentially prevents cross-binary races.
        run: cargo test -p epigraph-db --locked -- --test-threads=1
      - name: Test (epigraph-api, serialized)
        run: cargo test -p epigraph-api --locked -- --test-threads=1
      - name: Test (epigraph-engine, serialized)
        run: cargo test -p epigraph-engine --locked -- --test-threads=1
      - name: Test (epigraph-mcp, serialized)
        # claim_helper_tests adds a temporary CHECK constraint on `edges`
        # that would race with sibling tests under parallel execution.
        run: cargo test -p epigraph-mcp --locked -- --test-threads=1
      - name: Test (epigraph-embeddings, serialized)
        # pgvector tests use #[sqlx::test] which races with parallel siblings
        # on _sqlx_migrations whenever a new migration is added.
        run: cargo test -p epigraph-embeddings --locked -- --test-threads=1
      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings
      - name: Format check
        run: cargo fmt --check

  # Advisory, NOT a merge gate. cargo audit checks Cargo.lock against the
  # RustSec DB fetched at run time, so a blocking gate would red-light every
  # open PR the moment a new advisory lands on any transitive dependency —
  # and Foreman auto-merges epigraph PRs, so unrelated red CI is actively
  # harmful. continue-on-error keeps the result visible without blocking.
  # The lockfile currently carries known advisories (bytes, rsa, rustls-webpki,
  # sqlx, instant, …); flip this to a gate only once that backlog is triaged.
  audit:
    name: Security audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
      # Installed from source rather than via a prebuilt-binary action so the
      # trust surface stays the three actions pinned above — no extra upstream.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit
